<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Universe | Premium Platform</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Outfit:wght@300;400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="platform.css">
</head>
<body>
    <div id="platform-app">
        <!-- Background FX -->
        <div class="bg-glow"></div>
        <div class="bg-particles" id="particles"></div>

        <header>
            <div class="logo-container">
                <h1 id="platform-logo">GAME UNIVERSE</h1>
                <div class="logo-accent"></div>
            </div>
            <button id="add-game-btn" onclick="openModal()">
                <span class="btn-icon">+</span>
                <span class="btn-text">ADD NEW GAME</span>
            </button>
        </header>

        <main>
            <section class="hero">
                <div class="hero-content">
                    <span class="badge">FEATURED</span>
                    <h2 id="hero-title">INFINITY STEP</h2>
                    <p>도전하라, 끝없는 계단의 정점으로!</p>
                    <button class="play-btn-large" onclick="location.href='game.html'">PLAY NOW</button>
                </div>
            </section>

            <section class="game-grid-section">
                <div class="section-header">
                    <h3>GAME LIBRARY</h3>
                    <div class="line"></div>
                </div>
                <div id="game-grid" class="game-grid">
                    <!-- 게임 카드가 여기에 동적으로 추가됨 -->
                </div>
            </section>
        </main>

        <!-- ADD GAME MODAL -->
        <div id="add-modal" class="modal-overlay hidden">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>ADD NEW ADVENTURE</h2>
                    <button class="close-btn" onclick="closeModal()">&times;</button>
                </div>
                <div class="modal-body">
                    <div class="input-group">
                        <label for="game-title">GAME TITLE</label>
                        <input type="text" id="game-title" placeholder="Enter game title..." autocomplete="off">
                    </div>
                    <div class="input-group">
                        <label for="game-url">GAME URL URL</label>
                        <input type="text" id="game-url" placeholder="https://..." autocomplete="off">
                    </div>
                    <div class="input-group">
                        <label for="game-thumb">THUMBNAIL URL (OPTIONAL)</label>
                        <input type="text" id="game-thumb" placeholder="https://image-url..." autocomplete="off">
                    </div>
                    <button id="submit-game" class="submit-btn" onclick="addNewGame()">SAVE GAME</button>
                </div>
            </div>
        </div>

        <!-- Toast Container -->
        <div id="toast-container"></div>
    </div>

    <script src="platform.js"></script>
</body>
</html>
